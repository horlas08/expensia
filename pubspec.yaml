name: expensia
description: "A visually elegant financial application using Riverpod, GoRouter, and custom animations."
publish_to: 'none'

version: 1.0.0+4

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  
  # Routing
  go_router: ^14.6.2
  
  # UI & Animations
  animations: ^2.0.11
  smooth_sheets: ^0.17.0
  animated_theme_switcher: ^2.0.10
  animated_emoji: ^3.2.1
  animate_do: ^3.3.4
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.1.0
  fl_chart: ^0.70.2
  cupertino_icons: ^1.0.8

  # Localization & Utils
  easy_localization: ^3.0.7
  intl: ^0.20.2
  shared_preferences: ^2.4.0
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  flutter_file_dialog: ^3.0.2
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+8
  local_auth: ^3.0.1
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  http: ^1.2.0
  toastification: ^3.0.3
  image_picker: ^1.2.1
  math_expressions: ^2.6.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4
  auto_size_text: ^3.0.0
  blur: ^4.0.2
  flutter_native_contact_picker: ^0.0.11
  google_mobile_ads: ^8.0.0
  flutter_widget_from_html: ^0.17.2
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - assets/currencies_one_per_country_symbols_bilingual.json
    - assets/images/
    - assets/svg/
    - assets/lang/
    - assets/privacy-policy.html
    - assets/terms-use.html
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/loogo.png"
  min_sdk_android: 21 #
